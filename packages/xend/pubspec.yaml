name: xend
description: >-
  Embedded, non-custodial crypto payments for mobile apps: on-device Face ID signing,
  gasless fees, and .sol names behind a one-line send(). Solana + iOS in v0.1.
version: 0.1.0
homepage: https://github.com/EntryPointLabs/xend
repository: https://github.com/EntryPointLabs/xend
issue_tracker: https://github.com/EntryPointLabs/xend/issues
topics:
  - solana
  - payments
  - wallet
  - web3
  - crypto

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # Deliberately minimal. The SDK talks HTTP/WS to the backend and the platform
  # channel to native — no Solana/crypto package leaks into the public surface.
  http: ^1.2.0 # backend REST client; web-socket client is added in Phase 5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: XendSecurePlugin # bridges MethodChannel ai.xend/secure
